<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Map Picker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    #confirmBtn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background-color: #2196F3;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="map"></div>
<button id="confirmBtn">📍 Подтвердить точку</button>

<script>
  // Инициализация карты
  const map = L.map('map').setView([49.0661, 33.4236], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  let marker = null;

  // Храним координаты глобально
  window.selectedLat = null;
  window.selectedLng = null;

  // Клик по карте
  map.on('click', function(e) {
    const lat = e.latlng.lat;
    const lng = e.latlng.lng;

    window.selectedLat = lat;
    window.selectedLng = lng;

    if (marker) {
      map.removeLayer(marker);
    }

    marker = L.marker([lat, lng]).addTo(map);
  });

  // Кнопка подтверждения
  document.getElementById('confirmBtn').addEventListener('click', function() {

    if (!window.selectedLat || !window.selectedLng) {
      alert('Выберите точку на карте');
      return;
    }

    // ОТПРАВКА В TELEGRAM
    Telegram.WebApp.sendData(JSON.stringify({
      lat: window.selectedLat,
      lng: window.selectedLng
    }));

    // Закрыть WebApp (как в Uber)
    Telegram.WebApp.close();
  });

</script>

</body>
</html>
