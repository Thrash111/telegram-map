<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Telegram Map</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<style>
html, body {
margin:0;
padding:0;
height:100%;
}

#map {
height:100%;
}

#button {
position: absolute;
bottom:20px;
left:50%;
transform: translateX(-50%);
background:#2AABEE;
color:white;
padding:15px 20px;
border-radius:10px;
font-size:16px;
font-weight:bold;
z-index:999;
cursor:pointer;
}
</style>

</head>

<body>

<div id="map"></div>

<div id="button">
📍 Выбрать точку
</div>

<script>

let tg = window.Telegram.WebApp;
tg.expand();

let map = L.map('map').setView([50.4501, 30.5234], 12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom: 19
}
).addTo(map);

let marker;

map.on('click', function(e) {

if(marker){
map.removeLayer(marker);
}

marker = L.marker(e.latlng).addTo(map);

window.selectedLat = e.latlng.lat;
window.selectedLng = e.latlng.lng;

});

document.getElementById("button").onclick = function(){

if(!window.selectedLat){
alert("Выберите точку на карте");
return;
}

let data = {
latitude: window.selectedLat,
longitude: window.selectedLng
};

tg.sendData(JSON.stringify(data));

tg.close();

};

</script>

</body>
</html>
